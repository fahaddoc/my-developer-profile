<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Shah Fahad Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafaf9;
            --bg-card: #ffffff;
            --text: #0c0a09;
            --text-secondary: #57534e;
            --accent: #f97316;
            --accent-light: #fed7aa;
            --border: #e7e5e4;
            --success: #22c55e;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --text: #fafafa;
            --text-secondary: #a3a3a3;
            --accent: #fb923c;
            --accent-light: #431407;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'General Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .login-logo {
            width: 60px;
            height: 60px;
            background: var(--accent);
            color: white;
            font-size: 24px;
            font-weight: 800;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.3);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .dashboard.active {
            display: block;
        }

        .dash-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dash-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
        }

        .dash-logo span {
            width: 36px;
            height: 36px;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 800;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dash-actions {
            display: flex;
            gap: 12px;
        }

        .dash-content {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dash-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .dash-subtitle {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-card h3 {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .project-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .project-item:hover {
            border-color: var(--accent);
        }

        .project-icon {
            width: 60px;
            height: 60px;
            background: var(--accent-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .project-info {
            flex: 1;
        }

        .project-info h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .project-info p {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .project-actions {
            display: flex;
            gap: 8px;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-box {
            transform: scale(1);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            background: var(--bg);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .color-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-option:hover, .color-option.active {
            transform: scale(1.1);
            border-color: var(--text);
        }

        .icon-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .icon-option {
            width: 44px;
            height: 44px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-option:hover, .icon-option.active {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .tech-input {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .tech-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: inherit;
            font-size: 16px;
            line-height: 1;
        }

        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        @media (max-width: 768px) {
            .dash-header { padding: 16px; }
            .dash-content { padding: 16px; }
            .project-item { flex-direction: column; text-align: center; }
            .project-actions { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">SF</div>
            <h1 class="login-title">Admin Panel</h1>
            <p class="login-subtitle">Enter your credentials to manage portfolio</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="error-msg" id="loginError">Invalid username or password</p>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <header class="dash-header">
            <div class="dash-logo">
                <span>SF</span>
                Admin Panel
            </div>
            <div class="dash-actions">
                <a href="index.html" class="btn btn-secondary btn-sm" target="_blank">View Site</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </header>

        <main class="dash-content">
            <h1 class="dash-title">Welcome, Shah Fahad!</h1>
            <p class="dash-subtitle">Manage your portfolio projects from here.</p>

            <div id="alertContainer"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalProjects">0</h3>
                    <p>Total Projects</p>
                </div>
                <div class="stat-card">
                    <h3 id="featuredProjects">0</h3>
                    <p>Featured</p>
                </div>
                <div class="stat-card">
                    <h3>8+</h3>
                    <p>Years Experience</p>
                </div>
            </div>

            <div class="section-title">
                <span>Projects</span>
                <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Project</button>
            </div>

            <div class="projects-list" id="projectsList">
                <!-- Projects loaded here -->
            </div>
        </main>
    </div>

    <!-- Add/Edit Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Add Project</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">

                    <div class="form-group">
                        <label>Project Title *</label>
                        <input type="text" id="projTitle" placeholder="e.g., E-Commerce Platform" required>
                    </div>

                    <div class="form-group">
                        <label>Company/Client *</label>
                        <input type="text" id="projCompany" placeholder="e.g., ABC Company" required>
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <select id="projCategory" required>
                            <option value="web">Web App</option>
                            <option value="mobile">Mobile App</option>
                            <option value="realtime">Real-Time</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Year</label>
                        <input type="text" id="projYear" placeholder="2024" value="2024">
                    </div>

                    <div class="form-group">
                        <label>Description *</label>
                        <textarea id="projDesc" rows="3" placeholder="Describe the project..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Icon</label>
                        <div class="icon-options" id="iconOptions">
                            <div class="icon-option active" data-icon="🚀">🚀</div>
                            <div class="icon-option" data-icon="💻">💻</div>
                            <div class="icon-option" data-icon="📱">📱</div>
                            <div class="icon-option" data-icon="🤖">🤖</div>
                            <div class="icon-option" data-icon="📹">📹</div>
                            <div class="icon-option" data-icon="🏥">🏥</div>
                            <div class="icon-option" data-icon="🛒">🛒</div>
                            <div class="icon-option" data-icon="💬">💬</div>
                            <div class="icon-option" data-icon="📊">📊</div>
                            <div class="icon-option" data-icon="🎨">🎨</div>
                            <div class="icon-option" data-icon="⚡">⚡</div>
                            <div class="icon-option" data-icon="🔒">🔒</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Color</label>
                        <div class="color-options" id="colorOptions">
                            <div class="color-option active" data-color="#f97316" style="background:#f97316"></div>
                            <div class="color-option" data-color="#3b82f6" style="background:#3b82f6"></div>
                            <div class="color-option" data-color="#22c55e" style="background:#22c55e"></div>
                            <div class="color-option" data-color="#a855f7" style="background:#a855f7"></div>
                            <div class="color-option" data-color="#ec4899" style="background:#ec4899"></div>
                            <div class="color-option" data-color="#14b8a6" style="background:#14b8a6"></div>
                            <div class="color-option" data-color="#eab308" style="background:#eab308"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Technologies</label>
                        <div class="tech-input">
                            <input type="text" id="techInput" placeholder="e.g., React.js">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="addTech()">Add</button>
                        </div>
                        <div class="tech-tags" id="techTags"></div>
                    </div>

                    <div class="form-group">
                        <label>Live URL (optional)</label>
                        <input type="url" id="projLiveUrl" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>GitHub URL (optional)</label>
                        <input type="url" id="projGithubUrl" placeholder="https://github.com/...">
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="projFeatured"> Mark as Featured
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // CREDENTIALS - Change these!
        // ========================================
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'fahad@123';

        // ========================================
        // AUTH
        // ========================================
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                showDashboard();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                showDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            loadProjects();
        }

        function logout() {
            sessionStorage.removeItem('admin_logged_in');
            location.reload();
        }

        // ========================================
        // PROJECTS
        // ========================================
        let projects = [];
        let currentTechs = [];
        let editingId = null;

        function getProjects() {
            const stored = localStorage.getItem('portfolio_projects');
            if (stored) return JSON.parse(stored);

            // Default projects
            const defaults = [
                {
                    id: 'eocean',
                    title: 'WhatsApp ChatBot System',
                    company: 'E-OCEAN',
                    category: 'web',
                    year: '2024',
                    featured: true,
                    description: 'Developed a sophisticated ChatBot System to preview chatbot flows and guide WhatsApp users.',
                    tech: ['React.js', 'Redux', 'Tailwind CSS', 'jQuery'],
                    color: '#f97316',
                    icon: '🤖',
                    liveUrl: null,
                    githubUrl: null,
                    gallery: []
                },
                {
                    id: 'konnect',
                    title: 'Konnect - Communication Platform',
                    company: 'MILETAP',
                    category: 'realtime',
                    year: '2024',
                    featured: false,
                    description: 'Real-time communication platform with messaging and video conferencing.',
                    tech: ['React.js', 'SignalR', 'WebRTC', 'Redux'],
                    color: '#3b82f6',
                    icon: '📹',
                    liveUrl: null,
                    githubUrl: null,
                    gallery: []
                },
                {
                    id: 'opd',
                    title: 'OPD Entry Software',
                    company: 'KHADIM-E-INSANIYAT',
                    category: 'mobile',
                    year: '2023',
                    featured: false,
                    description: 'Healthcare OPD management software built with Flutter.',
                    tech: ['Flutter', 'Floor ORM', 'SQLite', 'Dart'],
                    color: '#22c55e',
                    icon: '🏥',
                    liveUrl: null,
                    githubUrl: null,
                    gallery: []
                }
            ];
            localStorage.setItem('portfolio_projects', JSON.stringify(defaults));
            return defaults;
        }

        function saveProjectsToStorage() {
            localStorage.setItem('portfolio_projects', JSON.stringify(projects));
        }

        function loadProjects() {
            projects = getProjects();
            renderProjectsList();
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalProjects').textContent = projects.length;
            document.getElementById('featuredProjects').textContent = projects.filter(p => p.featured).length;
        }

        function renderProjectsList() {
            const list = document.getElementById('projectsList');
            list.innerHTML = projects.map(p => `
                <div class="project-item">
                    <div class="project-icon" style="background: ${p.color}20; color: ${p.color}">
                        ${p.icon || '📁'}
                    </div>
                    <div class="project-info">
                        <h4>${p.title} ${p.featured ? '⭐' : ''}</h4>
                        <p>${p.company} • ${p.category} • ${p.year}</p>
                    </div>
                    <div class="project-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editProject('${p.id}')">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // ========================================
        // MODAL
        // ========================================
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add Project';
            document.getElementById('projectForm').reset();
            currentTechs = [];
            renderTechTags();
            resetColorAndIcon();
            document.getElementById('projectModal').classList.add('active');
        }

        function editProject(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Project';

            document.getElementById('projTitle').value = project.title;
            document.getElementById('projCompany').value = project.company;
            document.getElementById('projCategory').value = project.category;
            document.getElementById('projYear').value = project.year;
            document.getElementById('projDesc').value = project.description;
            document.getElementById('projLiveUrl').value = project.liveUrl || '';
            document.getElementById('projGithubUrl').value = project.githubUrl || '';
            document.getElementById('projFeatured').checked = project.featured;

            currentTechs = [...(project.tech || [])];
            renderTechTags();

            // Set icon
            document.querySelectorAll('.icon-option').forEach(el => {
                el.classList.toggle('active', el.dataset.icon === project.icon);
            });

            // Set color
            document.querySelectorAll('.color-option').forEach(el => {
                el.classList.toggle('active', el.dataset.color === project.color);
            });

            document.getElementById('projectModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }

        function resetColorAndIcon() {
            document.querySelectorAll('.icon-option').forEach((el, i) => {
                el.classList.toggle('active', i === 0);
            });
            document.querySelectorAll('.color-option').forEach((el, i) => {
                el.classList.toggle('active', i === 0);
            });
        }

        // Icon & Color selection
        document.querySelectorAll('.icon-option').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
            });
        });

        document.querySelectorAll('.color-option').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
            });
        });

        // Tech tags
        function addTech() {
            const input = document.getElementById('techInput');
            const value = input.value.trim();
            if (value && !currentTechs.includes(value)) {
                currentTechs.push(value);
                renderTechTags();
                input.value = '';
            }
        }

        document.getElementById('techInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTech();
            }
        });

        function removeTech(tech) {
            currentTechs = currentTechs.filter(t => t !== tech);
            renderTechTags();
        }

        function renderTechTags() {
            document.getElementById('techTags').innerHTML = currentTechs.map(t => `
                <span class="tech-tag">${t} <button onclick="removeTech('${t}')">&times;</button></span>
            `).join('');
        }

        // Save project
        function saveProject() {
            const title = document.getElementById('projTitle').value.trim();
            const company = document.getElementById('projCompany').value.trim();
            const category = document.getElementById('projCategory').value;
            const year = document.getElementById('projYear').value.trim() || '2024';
            const description = document.getElementById('projDesc').value.trim();
            const liveUrl = document.getElementById('projLiveUrl').value.trim() || null;
            const githubUrl = document.getElementById('projGithubUrl').value.trim() || null;
            const featured = document.getElementById('projFeatured').checked;

            const icon = document.querySelector('.icon-option.active')?.dataset.icon || '🚀';
            const color = document.querySelector('.color-option.active')?.dataset.color || '#f97316';

            if (!title || !company || !description) {
                alert('Please fill all required fields');
                return;
            }

            const projectData = {
                id: editingId || 'proj_' + Date.now(),
                title,
                company,
                category,
                year,
                description,
                tech: currentTechs,
                icon,
                color,
                liveUrl,
                githubUrl,
                featured,
                gallery: editingId ? (projects.find(p => p.id === editingId)?.gallery || []) : []
            };

            if (editingId) {
                const index = projects.findIndex(p => p.id === editingId);
                if (index !== -1) projects[index] = projectData;
            } else {
                projects.unshift(projectData);
            }

            saveProjectsToStorage();
            loadProjects();
            closeModal();
            showAlert('Project saved successfully!', 'success');
        }

        function deleteProject(id) {
            if (!confirm('Are you sure you want to delete this project?')) return;

            projects = projects.filter(p => p.id !== id);
            saveProjectsToStorage();
            loadProjects();
            showAlert('Project deleted!', 'success');
        }

        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        // Init
        checkAuth();
    </script>
</body>
</html>
